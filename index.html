<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Classroom</title>
  <link rel="icon" type="image/png" href="icons8-google-classroom-color-72.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #00ff66;
      text-align: center;
      padding-top: 60px;
    }

    h1 {
      color: #00ff66;
      margin-bottom: 20px;
      font-size: 40px;
    }

    /* Search bar styling */
    #searchBar {
      width: 60%;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #00ff66;
      border-radius: 8px;
      background: #111;
      color: #00ff66;
      margin-bottom: 25px;
      outline: none;
      transition: 0.2s;
    }

    #searchBar:focus {
      border-color: #00ffaa;
      box-shadow: 0 0 10px #00ffaa;
    }

    .game-button {
      background: #111;
      border: 2px solid #00ff66;
      color: #00ff66;
      padding: 15px 30px;
      margin: 12px;
      font-size: 20px;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s ease-in-out;
      display: inline-block;
    }

    .game-button:hover {
      background: #00ff66;
      color: #111;
      transform: scale(1.05);
    }

    .hidden {
      display: none;
    }

    /* Popup overlay */
    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    /* Popup box */
    #popupBox {
      background: #111;
      border: 2px solid #00ff66;
      padding: 30px;
      width: 350px;
      text-align: center;
      border-radius: 10px;
      color: #00ff66;
      box-shadow: 0 0 15px #00ff66;
    }

    /* Accept button */
    #acceptBtn {
      margin-top: 20px;
      padding: 12px 25px;
      background: #00ff66;
      color: #111;
      border: none;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    #acceptBtn:hover {
      transform: scale(1.05);
      background: #00ffaa;
    }
  </style>
</head>

<body>

  <!-- Popup -->
  <div id="popupOverlay">
    <div id="popupBox">
      <h2>DISCLAMER</h2>
      <p>All these games’ rights go to their respective owners. I do not claim to own any of these games. This is just a repo/github.io website to view/play these games</p>
      <button id="acceptBtn">Accept & Continue</button>
    </div>
  </div>

  <h1>Totally Cool Math Games</h1>
  <p>Repo https://github.com/Schooluser982/Schooluser982.github.io/</p>

  <!-- Search Bar -->
  <input type="text" id="searchBar" placeholder="Search for a game...">

  <!-- Game Buttons -->
  <div id="gameList">
    <button class="game-button" data-name="Flappy Bird" onclick="openGame('FlappyBird.html')">Flappy Bird</button>
    <button class="game-button" data-name="Infinite Craft" onclick="openGame('InfiniteCraft.html')">Infinite Craft</button>
    <button class="game-button" data-name="Sky Rider" onclick="openGame('SkyRiders.html')">Sky Rider</button>
    <button class="game-button" data-name="Slope" onclick="openGame('Slope.html')">Slope</button>
  </div>

  <script src="button.js"></script>

  <script>
    // Popup close
    document.getElementById("acceptBtn").addEventListener("click", () => {
      document.getElementById("popupOverlay").style.display = "none";
    });

    // Live search filter
    const searchBar = document.getElementById("searchBar");
    const buttons = document.querySelectorAll(".game-button");

    searchBar.addEventListener("input", () => {
      const query = searchBar.value.toLowerCase();

      buttons.forEach(btn => {
        const name = btn.dataset.name.toLowerCase();
        btn.classList.toggle("hidden", !name.includes(query));
      });
    });
  </script>

</body>
</html>
