<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Home - Classroom</title>
  <link rel="icon" type="image/png" href="icons8-google-classroom-color-72.png">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: #00ff66;
      text-align: center;
      padding-top: 80px;
    }

    /* NAV BAR */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #111;
      border-bottom: 2px solid #00ff66;
      padding: 15px 0;
      box-shadow: 0 0 10px #00ff66;
      z-index: 999;
    }

    nav a {
      color: #00ff66;
      margin: 0 20px;
      font-size: 20px;
      text-decoration: none;
      transition: 0.2s;
    }

    nav a:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    /* Search bar */
    #searchBar {
      width: 60%;
      padding: 12px;
      font-size: 18px;
      border: 2px solid #00ff66;
      border-radius: 8px;
      background: #111;
      color: #00ff66;
      margin-bottom: 25px;
      outline: none;
      transition: 0.2s;
    }

    #searchBar:focus {
      border-color: #00ffaa;
      box-shadow: 0 0 10px #00ffaa;
    }

    /* Game cards */
    .game-card {
      background: #111;
      border: 2px solid #00ff66;
      color: #00ff66;
      padding: 15px;
      margin: 15px;
      width: 220px;
      display: inline-block;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .game-card:hover {
      transform: scale(1.05);
      border-color: #00ffaa;
    }

    .game-card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .hidden {
      display: none;
    }

    /* Visit Counter */
    #visitCounterBox {
      margin: 20px auto;
      padding: 15px 25px;
      width: fit-content;
      background: #111;
      border: 2px solid #00ff66;
      border-radius: 10px;
      color: #00ff66;
      font-size: 20px;
      box-shadow: 0 0 12px #00ff66;
      transition: 0.2s;
    }

    #visitCounterBox:hover {
      transform: scale(1.05);
      border-color: #00ffaa;
      box-shadow: 0 0 15px #00ffaa;
    }

    #visitCount {
      font-weight: bold;
      color: #00ffaa;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav>
    <a href="index.html">Home</a>
    <a href="creators.html">Creators</a>
    <a href="info.html">Info</a>
  </nav>

  <h1>Totally Cool Math Games</h1>
  <pre>Repo: https://github.com/Schooluser982/Schooluser982.github.io/</pre>

  <!-- Visit Counter -->
  <div id="visitCounterBox">
    <p>Total Visits: <span id="visitCount">Loading...</span></p>
  </div>

  <!-- Search Bar -->
  <input type="text" id="searchBar" placeholder="Search for a game...">

  <!-- Game List -->
  <div id="gameslist">

    <div class="game-card" data-name="Flappy Bird" onclick="openGame('FlappyBird.html')">
      <img src="gamephoto/flappybird.png">
      <p>Flappy Bird</p>
    </div>

    <div class="game-card" data-name="Infinite Craft" onclick="openGame('InfiniteCraft.html')">
      <img src="gamephoto/infinitecraft.png">
      <p>Infinite Craft</p>
    </div>

    <div class="game-card" data-name="Sky Rider" onclick="openGame('SkyRiders.html')">
      <img src="gamephoto/skyrider.png">
      <p>Sky Rider</p>
    </div>

    <div class="game-card" data-name="Slope" onclick="openGame('Slope.html')">
      <img src="gamephoto/slope.png">
      <p>Slope</p>
    </div>

    <div class="game-card" data-name="Sound Board" onclick="openGame('soundBoard.html')">
      <img src="gamephoto/soundboard.png">
      <p>Sound Board</p>
    </div>

    <div class="game-card" data-name="Baldi's Basics" onclick="openGame('BaldisBasics.html')">
      <img src="gamephoto/Baldisbasics.png">
      <p>Baldi's Basics</p>
    </div>

    <div class="game-card" data-name="Space Waves" onclick="openGame('SpaceWaves.html')">
      <img src="gamephoto/Spacewaves.png">
      <p>Space Waves</p>
    </div>

  </div>

  <script src="counter.js"></script>

  <script>
    // Search filter
    const searchBar = document.getElementById("searchBar");
    const cards = document.querySelectorAll(".game-card");

    searchBar.addEventListener("input", () => {
      const query = searchBar.value.toLowerCase();
      cards.forEach(card => {
        const name = card.dataset.name.toLowerCase();
        card.classList.toggle("hidden", !name.includes(query));
      });
    });

    // Open game
    function openGame(url) {
      window.location.href = "games/" + url;
    }
  </script>

</body>
</html>
