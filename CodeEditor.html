<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mini Web IDE</title>
  <link rel="icon" type="image/png" href="MiniWebIDE.png">

<!-- CodeMirror CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/eclipse.min.css">

<style>
:root {
  --bg:#1e1e1e;
  --text:#fff;
  --panel-bg:#252526;
  --divider:#444;
  --devtools-height:300px;
}

body.light {
  --bg:#fff;
  --text:#000;
  --panel-bg:#f3f3f3;
  --divider:#ccc;
}

*{box-sizing:border-box;}

body{
  margin:0;
  display:flex;
  flex-direction:column;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,sans-serif;
  overflow:hidden;
}

/* NAVBAR */
nav{
  position:fixed;
  top:0;
  width:100%;
  background:#111;
  border-bottom:2px solid #00ff66;
  padding:15px 0;
  box-shadow:0 0 10px #00ff66;
  z-index:1000;
  text-align:center;
}
nav a{
  color:#00ff66;
  margin:0 20px;
  font-size:18px;
  text-decoration:none;
}
nav a:hover{
  color:#00ffaa;
  text-shadow:0 0 10px #00ffaa;
}

/* PUSH CONTENT */
.main{
  margin-top:70px;
  height:calc(100vh - 70px);
  display:flex;
  flex-direction:column;
}

header{
  padding:8px 12px;
  display:flex;
  gap:8px;
  background:#00000040;
}

header button{
  padding:4px 10px;
  border-radius:4px;
  border:1px solid #555;
  background:#333;
  color:#fff;
  cursor:pointer;
}

#container{
  flex:1;
  display:flex;
  min-height:0;
}

#left{
  width:50%;
  display:flex;
  flex-direction:column;
  background:var(--panel-bg);
}

#tabs{
  display:flex;
  background:#00000030;
}

.tab{
  flex:1;
  padding:6px;
  text-align:center;
  cursor:pointer;
}
.tab.active{
  background:#00000060;
  font-weight:bold;
}

#editors{flex:1;position:relative;}
.editor-wrapper{
  position:absolute;
  inset:0;
  display:none;
}
.editor-wrapper.active{display:block;}

.CodeMirror{
  height:100%;
}

#divider{
  width:6px;
  cursor:ew-resize;
  background:var(--divider);
}

#right{
  flex:1;
  display:flex;
  flex-direction:column;
}

#preview{
  flex:1;
  border:none;
  background:white;
}

#console{
  height:100px;
  background:#111;
  color:#f55;
  font-family:monospace;
  font-size:12px;
  padding:5px;
  overflow:auto;
}

#devtools{
  position:absolute;
  bottom:-300px;
  left:0;
  right:0;
  height:300px;
  background:#111;
  transition:0.3s;
}
#devtools.open{bottom:0;}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav>
  <a href="index.html">Home</a>
  <a href="creators.html">Creators</a>
  <a href="info.html">Info</a>
  <a href="sub.html">Game Submission Form</a>
  <a href="CodeEditor.html">Code Editor</a>
</nav>

<div class="main">

<header>
  <button id="runBtn">Run ▶</button>
  <button id="saveBtn">Save</button>
  <button id="loadBtn">Load</button>
  <input type="file" id="fileInput">
  <button id="themeBtn">Toggle Theme</button>
  <button id="devtoolsBtn">DevTools</button>
</header>

<div id="container">

<div id="left">
  <div id="tabs">
    <div class="tab active" data-target="html">HTML</div>
    <div class="tab" data-target="css">CSS</div>
    <div class="tab" data-target="js">JS</div>
  </div>

  <div id="editors">
    <div class="editor-wrapper active" id="html-wrapper">
      <textarea id="htmlEditor"><h1>Hello!</h1></textarea>
    </div>

    <div class="editor-wrapper" id="css-wrapper">
      <textarea id="cssEditor">body{background:#eee;}</textarea>
    </div>

    <div class="editor-wrapper" id="js-wrapper">
      <textarea id="jsEditor">console.log("hi");</textarea>
    </div>
  </div>
</div>

<div id="divider"></div>

<div id="right">
  <iframe id="preview"></iframe>
  <div id="console"></div>

  <div id="devtools"></div>
</div>

</div>
</div>

<!-- CodeMirror -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>

<script>
let dark=true;

const htmlCM=CodeMirror.fromTextArea(htmlEditor,{mode:"xml",lineNumbers:true,theme:"material-darker"});
const cssCM=CodeMirror.fromTextArea(cssEditor,{mode:"css",lineNumbers:true,theme:"material-darker"});
const jsCM=CodeMirror.fromTextArea(jsEditor,{mode:"javascript",lineNumbers:true,theme:"material-darker"});

/* tabs */
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.querySelectorAll(".editor-wrapper").forEach(w=>w.classList.remove("active"));
    document.getElementById(t.dataset.target+"-wrapper").classList.add("active");
  };
});

/* run */
runBtn.onclick=()=>{
  const html=htmlCM.getValue();
  const css=cssCM.getValue();
  const js=jsCM.getValue();

  preview.srcdoc=`
  <style>${css}</style>
  ${html}
  <script>${js}<\/script>
  `;
};

/* save */
saveBtn.onclick=()=>{
  const data={
    html:htmlCM.getValue(),
    css:cssCM.getValue(),
    js:jsCM.getValue()
  };
  const blob=new Blob([JSON.stringify(data)],{type:"text/plain"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="project.txt";
  a.click();
};

/* load */
loadBtn.onclick=()=>fileInput.click();
fileInput.onchange=e=>{
  const r=new FileReader();
  r.onload=()=>{
    const d=JSON.parse(r.result);
    htmlCM.setValue(d.html);
    cssCM.setValue(d.css);
    jsCM.setValue(d.js);
  };
  r.readAsText(e.target.files[0]);
};

/* theme */
themeBtn.onclick=()=>{
  dark=!dark;
  document.body.classList.toggle("light");
  const t=dark?"material-darker":"eclipse";
  htmlCM.setOption("theme",t);
  cssCM.setOption("theme",t);
  jsCM.setOption("theme",t);
};

/* devtools */
devtoolsBtn.onclick=()=>{
  devtools.classList.toggle("open");
};

/* resize */
let drag=false;
divider.onmousedown=()=>drag=true;
document.onmouseup=()=>drag=false;
document.onmousemove=e=>{
  if(!drag)return;
  left.style.width=(e.clientX/window.innerWidth*100)+"%";
};

/* initial run */
runBtn.click();
</script>

</body>
</html>
