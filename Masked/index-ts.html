<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Masked Forces Unlimited</title>

    <link rel="stylesheet" href="TemplateData/style.css">
    <script src="TemplateData/UnityProgress.js"></script>

    <!-- Load UnityLoader.js from GitHub Pages (NOT raw.githubusercontent.com) -->
    <script src="https://maskedforcesunlimited.github.io/Build/UnityLoader.js"></script>

    <style>
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: black;
      }
      #gameContainer {
        width: 100vw;
        height: 100vh;
      }
    </style>

    <script>
      var gameInstance = UnityLoader.instantiate(
        "gameContainer",
        "https://maskedforcesunlimited.github.io/Build/masked-forces-unlimited.json",
        { onProgress: UnityProgress }
      );
    </script>
  </head>

  <body>
    <div id="gameContainer"></div>
  </body>
</html>
