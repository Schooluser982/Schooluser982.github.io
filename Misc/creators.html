<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Creators</title>

  <style>
    body {
      background: #0d0d0d;
      color: #00ff66;
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #111;
      border-bottom: 2px solid #00ff66;
      padding: 15px 0;
      box-shadow: 0 0 10px #00ff66;
      z-index: 999;
    }

    nav a {
      color: #00ff66;
      margin: 0 20px;
      font-size: 20px;
      text-decoration: none;
      transition: 0.2s;
    }

    nav a:hover {
      color: #00ffaa;
      text-shadow: 0 0 10px #00ffaa;
    }

    h1 {
      font-size: 40px;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->
  <nav id="navbar"></nav>

  <script>
    const navFiles = [
      "index.html",
      "creators.html",
      "info.html",
      "sub.html",
      "CodeEditor.html"
    ];

    const navContainer = document.getElementById("navbar");

    navFiles.forEach(file => {
      fetch("Misc/" + file)
        .then(res => res.text())
        .then(html => {
          const temp = document.createElement("div");
          temp.innerHTML = html;

          const link = temp.querySelector("a");
          if (link) navContainer.appendChild(link);
        })
        .catch(err => console.error("Failed to load:", file, err));
    });
  </script>

  <h1>Creators</h1>
  <p>SchoolUser982 — OWNER</p>
  <p>Ryan12 — Jr Editor</p>

</body>
</html>
