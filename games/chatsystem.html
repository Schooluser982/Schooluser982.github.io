<!DOCTYPE html>
<html>
<head>
  <title>Chat System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #topBar {
      background: #111;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      font-size: 14px;
    }

    #roomInfo {
      opacity: 0.8;
    }

    #roomButtons button {
      margin-left: 8px;
      padding: 6px 10px;
      background: #4da3ff;
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }

    #roomButtons button:hover {
      background: #1f7bd8;
    }

    #chatContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      margin-bottom: 15px;
    }

    .msg {
      background: #2c2c2c;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 10px;
      max-width: 70%;
      word-wrap: break-word;
      position: relative;
    }

    .msg .username {
      font-weight: bold;
      color: #4da3ff;
    }

    .msg .time {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 3px;
    }

    .editBtn {
      position: absolute;
      right: 8px;
      top: 8px;
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }

    .editBtn:hover {
      color: #fff;
    }

    .systemMsg {
      text-align: center;
      opacity: 0.7;
      margin: 8px 0;
      font-size: 14px;
    }

    #typingIndicator {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
      height: 18px;
    }

    #inputArea {
      display: flex;
      gap: 10px;
    }

    #msgInput, #usernameInput {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    #sendBtn, #setUserBtn {
      padding: 10px 20px;
      background: #4da3ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #sendBtn:hover, #setUserBtn:hover {
      background: #1f7bd8;
    }

    #usernameBox {
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #333;
    }

    #adminTag {
      color: #ffb347;
      font-weight: bold;
      margin-left: 8px;
    }
  </style>
</head>
<body>

<div id="usernameBox">
  <input id="usernameInput" placeholder="Enter your username...">
  <button id="setUserBtn">Set Username</button>
</div>

<div id="topBar">
  <div id="roomInfo">Room: <span id="roomName">public</span></div>
  <div id="roomButtons">
    <button id="createRoomBtn">Create Room</button>
    <button id="joinRoomBtn">Join Room</button>
  </div>
</div>

<div id="chatContainer">
  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io("https://9m8t7v-3000.csb.app");

  let username = null;
  let typingTimeout;
  let isAdmin = false;

  const roomNameEl = document.getElementById("roomName");
  const messagesEl = document.getElementById("messages");
  const typingEl = document.getElementById("typingIndicator");

  // Set username
  document.getElementById("setUserBtn").onclick = () => {
    const name = document.getElementById("usernameInput").value.trim();
    if (!name) return alert("Enter a username first!");

    socket.emit("set username", name, (res) => {
      if (!res.ok) {
        alert(res.error);
        return;
      }

      username = name;
      isAdmin = res.isAdmin;
      roomNameEl.textContent = res.room || "public";

      document.getElementById("msgInput").disabled = false;
      document.getElementById("sendBtn").disabled = false;
      document.getElementById("usernameBox").style.display = "none";

      if (isAdmin) {
        const tag = document.createElement("span");
        tag.id = "adminTag";
        tag.textContent = "(ADMIN)";
        document.getElementById("roomInfo").appendChild(tag);
      }
    });
  };

  // Create room (UI Option C)
  document.getElementById("createRoomBtn").onclick = () => {
    if (!username) return alert("Set username first.");
    const roomName = prompt("Enter new room name:");
    if (!roomName) return;
    const password = prompt("Set a password (leave blank for none):") || "";

    socket.emit("create room", { roomName, password }, (res) => {
      if (!res.ok) {
        alert(res.error);
      } else {
        alert("Room created. Use Join Room to enter it.");
      }
    });
  };

  // Join room (UI Option C)
  document.getElementById("joinRoomBtn").onclick = () => {
    if (!username) return alert("Set username first.");
    const roomName = prompt("Enter room name to join:");
    if (!roomName) return;
    const password = prompt("Enter room password (if any):") || "";

    socket.emit("join room", { roomName, password }, (res) => {
      if (!res.ok) {
        alert(res.error);
      } else {
        roomNameEl.textContent = res.room;
        messagesEl.innerHTML = "";
      }
    });
  };

  // Send message
  document.getElementById("sendBtn").onclick = send;
  document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter") send();

    if (!username) return;
    socket.emit("typing");

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      socket.emit("stop typing");
    }, 800);
  });

  function send() {
    const input = document.getElementById("msgInput");
    if (!input.value.trim()) return;

    socket.emit("chat message", {
      text: input.value
    });

    input.value = "";
    socket.emit("stop typing");
  }

  // Display chat messages
  socket.on("chat message", (msg) => {
    const div = document.createElement("div");
    div.className = "msg";
    div.id = msg.id;

    div.innerHTML = `
      <div class="username">${msg.user}</div>
      <div class="text">${msg.text}</div>
      <div class="time">${msg.time}</div>
      ${msg.user === username ? `<button class="editBtn">Edit</button>` : ""}
    `;

    if (msg.user === username) {
      const btn = div.querySelector(".editBtn");
      btn.onclick = () => {
        const currentText = div.querySelector(".text").textContent;
        const newText = prompt("Edit your message:", currentText);
        if (newText === null || !newText.trim()) return;

        socket.emit("edit message", {
          id: msg.id,
          newText: newText
        });
      };
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  });

  // Handle edited messages
  socket.on("edit message", (data) => {
    const msgDiv = document.getElementById(data.id);
    if (!msgDiv) return;

    msgDiv.querySelector(".text").textContent = data.newText;

    const timeEl = msgDiv.querySelector(".time");
    if (!timeEl.textContent.includes("(edited)")) {
      timeEl.textContent += " (edited)";
    }
  });

  // Typing indicator
  socket.on("typing", (user) => {
    typingEl.textContent = `${user} is typing...`;
  });

  socket.on("stop typing", () => {
    typingEl.textContent = "";
  });

  // Join/Leave notifications
  socket.on("user joined", (data) => {
    showSystemMessage(`${data.user} joined ${data.room}`);
  });

  socket.on("user left", (data) => {
    showSystemMessage(`${data.user} left ${data.room}`);
  });

  // System messages (mute/ban/errors)
  socket.on("system message", (text) => {
    showSystemMessage(text);
  });

  function showSystemMessage(text) {
    const div = document.createElement("div");
    div.className = "systemMsg";
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
</script>

</body>
</html>
