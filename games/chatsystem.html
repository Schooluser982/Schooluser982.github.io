<!DOCTYPE html>
<html>
<head>
  <title>Chat System</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chatContainer {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding-right: 10px;
      margin-bottom: 15px;
    }

    .msg {
      background: #2c2c2c;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 10px;
      max-width: 70%;
      word-wrap: break-word;
      position: relative;
    }

    .msg .username {
      font-weight: bold;
      color: #4da3ff;
    }

    .msg .time {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 3px;
    }

    .editBtn {
      position: absolute;
      right: 8px;
      top: 8px;
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
    }

    .editBtn:hover {
      color: #fff;
    }

    .systemMsg {
      text-align: center;
      opacity: 0.7;
      margin: 8px 0;
      font-size: 14px;
    }

    #typingIndicator {
      font-size: 14px;
      opacity: 0.7;
      margin-bottom: 10px;
      height: 18px;
    }

    #inputArea {
      display: flex;
      gap: 10px;
    }

    #msgInput, #usernameInput {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    #sendBtn, #setUserBtn {
      padding: 10px 20px;
      background: #4da3ff;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #sendBtn:hover, #setUserBtn:hover {
      background: #1f7bd8;
    }

    #usernameBox {
      background: #111;
      padding: 15px;
      display: flex;
      gap: 10px;
      border-bottom: 1px solid #333;
    }
  </style>
</head>
<body>

<div id="usernameBox">
  <input id="usernameInput" placeholder="Enter your username...">
  <button id="setUserBtn">Set Username</button>
</div>

<div id="chatContainer">
  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io("https://9m8t7v-3000.csb.app");

  let username = null;
  let typingTimeout;

  // Set username
  document.getElementById("setUserBtn").onclick = () => {
    const name = document.getElementById("usernameInput").value.trim();
    if (!name) return alert("Enter a username first!");

    username = name;

    document.getElementById("msgInput").disabled = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("usernameBox").style.display = "none";

    socket.emit("user joined", username);
  };

  // Send message
  document.getElementById("sendBtn").onclick = send;
  document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter") send();

    if (!username) return;
    socket.emit("typing", username);

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      socket.emit("stop typing");
    }, 800);
  });

  function send() {
    const input = document.getElementById("msgInput");
    if (!input.value.trim()) return;

    socket.emit("chat message", {
      user: username,
      text: input.value
    });

    input.value = "";
    socket.emit("stop typing");
  }

  // Display chat messages
  socket.on("chat message", (msg) => {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";
    div.id = msg.id;

    div.innerHTML = `
      <div class="username">${msg.user}</div>
      <div class="text">${msg.text}</div>
      <div class="time">${msg.time}</div>
      ${msg.user === username ? `<button class="editBtn">Edit</button>` : ""}
    `;

    if (msg.user === username) {
      const btn = div.querySelector(".editBtn");
      btn.onclick = () => {
        const currentText = div.querySelector(".text").textContent;
        const newText = prompt("Edit your message:", currentText);
        if (newText === null || !newText.trim()) return;

        socket.emit("edit message", {
          id: msg.id,
          newText: newText
        });
      };
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  // Handle edited messages
  socket.on("edit message", (data) => {
    const msgDiv = document.getElementById(data.id);
    if (!msgDiv) return;

    msgDiv.querySelector(".text").textContent = data.newText;

    const timeEl = msgDiv.querySelector(".time");
    if (!timeEl.textContent.includes("(edited)")) {
      timeEl.textContent += " (edited)";
    }
  });

  // Typing indicator
  socket.on("typing", (user) => {
    document.getElementById("typingIndicator").textContent = `${user} is typing...`;
  });

  socket.on("stop typing", () => {
    document.getElementById("typingIndicator").textContent = "";
  });

  // Join/Leave notifications
  socket.on("user joined", (user) => {
    showSystemMessage(`${user} joined the chat`);
  });

  socket.on("user left", (user) => {
    showSystemMessage(`${user} left the chat`);
  });

  function showSystemMessage(text) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "systemMsg";
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>

</body>
</html>
