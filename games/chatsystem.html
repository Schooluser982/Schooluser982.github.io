<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Discord-style Chat</title>
  <script src="https://js.pusher.com/8.2/pusher.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b0b10;
      color: #e5e5e5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-wrapper {
      width: 100%;
      max-width: 800px;
      height: 90vh;
      background: #1e1f23;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }
    .chat-header {
      padding: 10px 16px;
      background: #2b2d31;
      border-bottom: 1px solid #202225;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-header-title {
      font-weight: 600;
    }
    .chat-header-user {
      font-size: 13px;
      color: #aaa;
    }
    .chat-messages {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
      background: #313338;
    }
    .message {
      margin-bottom: 10px;
      display: flex;
      gap: 8px;
    }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #5865f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }
    .message-body {
      flex: 1;
    }
    .message-header {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .username {
      font-weight: 600;
      font-size: 14px;
    }
    .timestamp {
      font-size: 11px;
      color: #aaa;
    }
    .message-text {
      font-size: 14px;
      margin-top: 2px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .chat-input-area {
      padding: 10px 12px;
      background: #2b2d31;
      border-top: 1px solid #202225;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .name-input {
      width: 120px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #202225;
      background: #1e1f23;
      color: #e5e5e5;
      font-size: 13px;
    }
    .message-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 4px;
      border: 1px solid #202225;
      background: #1e1f23;
      color: #e5e5e5;
      font-size: 14px;
    }
    .send-button {
      padding: 8px 14px;
      border-radius: 4px;
      border: none;
      background: #5865f2;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .send-button:disabled {
      opacity: 0.5;
      cursor: default;
    }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div class="chat-header-title"># general</div>
    <div class="chat-header-user" id="headerUser"></div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <div class="chat-input-area">
    <input id="name" class="name-input" placeholder="Name" />
    <input id="input" class="message-input" placeholder="Message" />
    <button id="send" class="send-button">Send</button>
  </div>
</div>

<script>
  // --- CONFIG: put your Pusher key + cluster here ---
  const PUSHER_KEY = "f0f528ec17ffdf517b7b"; // replace if needed
  const PUSHER_CLUSTER = "us2";               // replace if needed
  // --------------------------------------------------

  // Random color per user (for avatar background)
  function randomColor(seed) {
    let hash = 0;
    for (let i = 0; i < seed.length; i++) {
      hash = seed.charCodeAt(i) + ((hash << 5) - hash);
    }
    const hue = Math.abs(hash) % 360;
    return `hsl(${hue}, 70%, 55%)`;
  }

  // Format time like "3:21 PM"
  function formatTime(date) {
    return date.toLocaleTimeString([], { hour: "numeric", minute: "2-digit" });
  }

  const nameInput = document.getElementById("name");
  const msgInput = document.getElementById("input");
  const sendBtn = document.getElementById("send");
  const messagesDiv = document.getElementById("messages");
  const headerUser = document.getElementById("headerUser");

  // Show current "identity" in header
  function updateHeaderName() {
    const name = nameInput.value.trim() || "Anonymous";
    headerUser.textContent = `You are: ${name}`;
  }
  nameInput.addEventListener("input", updateHeaderName);
  updateHeaderName();

  // Initialize Pusher
  const pusher = new Pusher(PUSHER_KEY, {
    cluster: PUSHER_CLUSTER
  });

  // Subscribe to private channel
  const channel = pusher.subscribe("private-chat");

  // Receive messages
  channel.bind("client-message", function(data) {
    addMessageToUI(data.name, data.text, data.time);
  });

  // Add message to UI
  function addMessageToUI(name, text, time) {
    const wrapper = document.createElement("div");
    wrapper.className = "message";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    const initials = (name || "A").trim()[0]?.toUpperCase() || "A";
    avatar.textContent = initials;
    avatar.style.background = randomColor(name || "Anonymous");

    const body = document.createElement("div");
    body.className = "message-body";

    const header = document.createElement("div");
    header.className = "message-header";

    const userSpan = document.createElement("span");
    userSpan.className = "username";
    userSpan.textContent = name || "Anonymous";

    const timeSpan = document.createElement("span");
    timeSpan.className = "timestamp";
    timeSpan.textContent = time || formatTime(new Date());

    header.appendChild(userSpan);
    header.appendChild(timeSpan);

    const textDiv = document.createElement("div");
    textDiv.className = "message-text";
    textDiv.textContent = text;

    body.appendChild(header);
    body.appendChild(textDiv);

    wrapper.appendChild(avatar);
    wrapper.appendChild(body);

    messagesDiv.appendChild(wrapper);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  }

  // Send message
  function sendMessage() {
    const name = nameInput.value.trim() || "Anonymous";
    const text = msgInput.value.trim();
    if (!text) return;

    const payload = {
      name,
      text,
      time: formatTime(new Date())
    };

    // Trigger client event
    channel.trigger("client-message", payload);

    msgInput.value = "";
  }

  sendBtn.addEventListener("click", sendMessage);
  msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
