<!DOCTYPE html>
<html>
<head>
  <title>Chat System</title>
  <style>
body {
  font-family: "Inter", Arial, sans-serif;
  background: #0f0f10;
  color: #e6e6e6;
  margin: 0;
  padding: 0;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Username bar */
  #usernameBox {
  background: #141416;
  padding: 15px;
  display: flex;
  gap: 10px;
  border-bottom: 1px solid #2a2a2d;
  box-shadow: 0 2px 6px rgba(0,0,0,0.4);
}

  /* Chat container */
  #chatContainer {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 20px;
}

  /* Messages area */
  #messages {
  flex: 1;
  overflow-y: auto;
  padding-right: 10px;
  margin-bottom: 15px;
  scrollbar-width: thin;
  scrollbar-color: #3a3a3d #1a1a1c;
}

#messages::-webkit-scrollbar {
  width: 8px;
}

#messages::-webkit-scrollbar-thumb {
  background: #3a3a3d;
  border-radius: 4px;
}

  /* Message bubble */
  .msg {
  background: #1c1c1f;
  padding: 12px 16px;
  border-radius: 14px;
  margin-bottom: 12px;
  max-width: 70%;
  word-wrap: break-word;
  position: relative;
  border: 1px solid #2a2a2d;
  transition: background 0.2s;
}

  .msg:hover {
  background: #222226;
}

  /* Username */
  .msg .username {
  font-weight: 600;
  color: #4da3ff;
  margin-bottom: 4px;
}

  /* Timestamp */
  .msg .time {
  font-size: 12px;
  opacity: 0.55;
  margin-top: 6px;
}

  /* Edit button */
  .editBtn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: transparent;
  border: none;
  color: #888;
  font-size: 12px;
  cursor: pointer;
  transition: color 0.2s;
}

.editBtn:hover {
  color: #fff;
}

  /* System messages */
  .systemMsg {
  text-align: center;
  opacity: 0.6;
  margin: 10px 0;
  font-size: 14px;
  font-style: italic;
}

  /* Typing indicator */
  #typingIndicator {
  font-size: 14px;
  opacity: 0.7;
  margin-bottom: 10px;
  height: 18px;
  color: #4da3ff;
}

  /* Input area */
  #inputArea {
  display: flex;
  gap: 10px;
  background: #141416;
  padding: 12px;
  border-top: 1px solid #2a2a2d;
  box-shadow: 0 -2px 6px rgba(0,0,0,0.4);
}

  /* Inputs */
  #msgInput, #usernameInput {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #2a2a2d;
  background: #1a1a1c;
  color: #e6e6e6;
  font-size: 16px;
  transition: border 0.2s, background 0.2s;
}

  #msgInput:focus, #usernameInput:focus {
  border-color: #4da3ff;
  background: #1f1f22;
}

  /* Buttons */
  #sendBtn, #setUserBtn {
  padding: 12px 20px;
  background: #4da3ff;
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  font-size: 16px;
  font-weight: 600;
  transition: background 0.2s, transform 0.1s;
}

  #sendBtn:hover, #setUserBtn:hover {
  background: #1f7bd8;
}

  #sendBtn:active, #setUserBtn:active {
  transform: scale(0.97);
}
  </style>
</head>
<body>

<div id="usernameBox">
  <input id="usernameInput" placeholder="Enter your username...">
  <button id="setUserBtn">Set Username</button>
</div>

<div id="chatContainer">
  <div id="messages"></div>
  <div id="typingIndicator"></div>

  <div id="inputArea">
    <input id="msgInput" placeholder="Type a message..." disabled>
    <button id="sendBtn" disabled>Send</button>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
  const socket = io("https://9m8t7v-3000.csb.app");

  let username = null;
  let typingTimeout;

  // Set username
  document.getElementById("setUserBtn").onclick = () => {
    const name = document.getElementById("usernameInput").value.trim();
    if (!name) return alert("Enter a username first!");

    username = name;

    document.getElementById("msgInput").disabled = false;
    document.getElementById("sendBtn").disabled = false;
    document.getElementById("usernameBox").style.display = "none";

    socket.emit("user joined", username);
  };

  // Send message
  document.getElementById("sendBtn").onclick = send;
  document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter") send();

    if (!username) return;
    socket.emit("typing", username);

    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      socket.emit("stop typing");
    }, 800);
  });

  function send() {
    const input = document.getElementById("msgInput");
    if (!input.value.trim()) return;

    socket.emit("chat message", {
      user: username,
      text: input.value
    });

    input.value = "";
    socket.emit("stop typing");
  }

  // Display chat messages
  socket.on("chat message", (msg) => {
    const box = document.getElementById("messages");

    const div = document.createElement("div");
    div.className = "msg";
    div.id = msg.id;

    div.innerHTML = `
      <div class="username">${msg.user}</div>
      <div class="text">${msg.text}</div>
      <div class="time">${msg.time}</div>
      ${msg.user === username ? `<button class="editBtn">Edit</button>` : ""}
    `;

    if (msg.user === username) {
      const btn = div.querySelector(".editBtn");
      btn.onclick = () => {
        const currentText = div.querySelector(".text").textContent;
        const newText = prompt("Edit your message:", currentText);
        if (newText === null || !newText.trim()) return;

        socket.emit("edit message", {
          id: msg.id,
          newText: newText
        });
      };
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  });

  // Handle edited messages
  socket.on("edit message", (data) => {
    const msgDiv = document.getElementById(data.id);
    if (!msgDiv) return;

    msgDiv.querySelector(".text").textContent = data.newText;

    const timeEl = msgDiv.querySelector(".time");
    if (!timeEl.textContent.includes("(edited)")) {
      timeEl.textContent += " (edited)";
    }
  });

  // Typing indicator
  socket.on("typing", (user) => {
    document.getElementById("typingIndicator").textContent = `${user} is typing...`;
  });

  socket.on("stop typing", () => {
    document.getElementById("typingIndicator").textContent = "";
  });

  // Join/Leave notifications
  socket.on("user joined", (user) => {
    showSystemMessage(`${user} joined the chat`);
  });

  socket.on("user left", (user) => {
    showSystemMessage(`${user} left the chat`);
  });

  function showSystemMessage(text) {
    const box = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "systemMsg";
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>

</body>
</html>
