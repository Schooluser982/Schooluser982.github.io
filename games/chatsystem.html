<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P GitHub Chat</title>
  <script src="https://unpkg.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: #0b0b10; color: #eee; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-wrapper { width: 95%; max-width: 500px; height: 80vh; background: #1e1f23; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
    #status-bar { padding: 10px; background: #2b2d31; font-size: 12px; text-align: center; border-bottom: 1px solid #333; color: #5865f2; font-weight: bold; }
    #messages { flex: 1; padding: 15px; overflow-y: auto; background: #313338; display: flex; flex-direction: column; gap: 8px; }
    .msg { font-size: 14px; line-height: 1.4; }
    .user { color: #5865f2; font-weight: bold; }
    .sys { color: #888; font-size: 11px; text-align: center; margin: 4px 0; }
    .input-area { padding: 10px; background: #2b2d31; display: flex; gap: 8px; }
    input { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #111; color: white; outline: none; }
    #name { width: 80px; }
    #text { flex: 1; }
    button { padding: 10px 20px; background: #5865f2; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #4752c4; }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div id="status-bar">Connecting to Signaling Server...</div>
  <div id="messages"></div>
  <div class="input-area">
    <input id="name" type="text" placeholder="Name" value="User">
    <input id="text" type="text" placeholder="Message...">
    <button id="send">Send</button>
  </div>
</div>

<script>
  // 1. CHANGE THIS KEY to something totally unique to you
  const LOBBY_ID = "MY_UNIQUE_GHPAGES_CHAT_2024"; 
  
  const status = document.getElementById('status-bar');
  const messages = document.getElementById('messages');
  const nameInp = document.getElementById('name');
  const textInp = document.getElementById('text');
  const sendBtn = document.getElementById('send');

  let peer = null;
  let connections = [];
  let isHost = false;

  function log(txt, type='msg') {
    const div = document.createElement('div');
    div.className = type;
    div.innerHTML = txt;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  // 2. Initialize with SECURE settings for GitHub Pages
  function start(targetId = null) {
    if (peer) peer.destroy();
    
    // Explicitly force HTTPS/Secure connection
    peer = new Peer(targetId, {
      debug: 2,
      secure: true,
      port: 443
    });

    peer.on('open', (id) => {
      if (id === LOBBY_ID) {
        isHost = true;
        status.innerText = "Lobby Online (You are Host)";
        log("--- You started the lobby ---", 'sys');
        peer.on('connection', c => setup(c));
      } else {
        status.innerText = "Searching for Lobby...";
        connectToLobby();
      }
    });

    peer.on('error', (err) => {
      console.warn("PeerJS Error:", err.type);
      if (err.type === 'unavailable-id') start(); // ID taken, become guest
      if (err.type === 'peer-unavailable') start(LOBBY_ID); // Lobby gone, become host
    });
  }

  function connectToLobby() {
    const conn = peer.connect(LOBBY_ID);
    
    // Fail-safe: If no connection in 4 seconds, become the host yourself
    const timer = setTimeout(() => {
      if (connections.length === 0) {
        log("Lobby not found. Hosting...", 'sys');
        start(LOBBY_ID);
      }
    }, 4000);

    conn.on('open', () => {
      clearTimeout(timer);
      status.innerText = "Connected to Lobby";
      log("--- Joined the chat ---", 'sys');
      setup(conn);
    });
  }

  function setup(conn) {
    if (!connections.find(c => c.peer === conn.peer)) connections.push(conn);

    conn.on('data', (data) => {
      if (isHost) connections.forEach(c => { if(c.peer !== conn.peer) c.send(data); });
      log(`<span class="user">${data.n}:</span> ${data.t}`);
    });

    conn.on('close', () => {
      connections = connections.filter(c => c.peer !== conn.peer);
      log("A user left the chat.", 'sys');
    });
  }

  sendBtn.onclick = () => {
    if (!textInp.value.trim()) return;
    const data = { n: nameInp.value, t: textInp.value };
    connections.forEach(c => { if(c.open) c.send(data); });
    log(`<span class="user">You:</span> ${data.t}`);
    textInp.value = "";
  };

  textInp.onkeypress = (e) => { if(e.key === "Enter") sendBtn.onclick(); };

  start();
</script>

</body>
</html>
