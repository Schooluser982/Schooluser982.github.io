<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>P2P Quick Chat</title>
  <script src="https://unpkg.com"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: sans-serif; background: #0b0b10; color: #e5e5e5; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .chat-wrapper { width: 100%; max-width: 600px; height: 80vh; background: #1e1f23; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    .chat-header { padding: 12px; background: #2b2d31; border-bottom: 1px solid #202225; display: flex; justify-content: space-between; align-items: center; }
    .chat-messages { flex: 1; padding: 15px; overflow-y: auto; background: #313338; }
    .message { margin-bottom: 10px; font-size: 14px; }
    .username { font-weight: bold; color: #5865f2; margin-right: 5px; }
    .chat-input-area { padding: 10px; background: #2b2d31; display: flex; gap: 5px; }
    input { padding: 8px; border-radius: 4px; border: none; background: #1e1f23; color: white; }
    .name-input { width: 80px; }
    .message-input { flex: 1; }
    button { padding: 8px 15px; background: #5865f2; color: white; border: none; border-radius: 4px; cursor: pointer; }
    .system { font-style: italic; color: #888; text-align: center; margin: 5px 0; font-size: 12px; }
  </style>
</head>
<body>

<div class="chat-wrapper">
  <div class="chat-header">
    <div id="status" style="font-weight:bold">Status: Initializing...</div>
    <div id="myId" style="font-size:10px; color:#aaa">ID: ---</div>
  </div>
  <div id="messages" class="chat-messages"></div>
  <div class="chat-input-area">
    <input id="name" class="name-input" placeholder="Name" value="Guest" />
    <input id="input" class="message-input" placeholder="Type a message..." />
    <button id="send">Send</button>
  </div>
</div>

<script>
  // Change this string to something unique for your group
  const LOBBY_ID = "DEMO_CHAT_LOBBY_999"; 
  
  const statusEl = document.getElementById('status');
  const myIdEl = document.getElementById('myId');
  const messagesEl = document.getElementById('messages');
  const msgInput = document.getElementById('input');
  const nameInput = document.getElementById('name');

  let peer = null;
  let connections = [];
  let isHost = false;

  function addLog(text, isSystem = true) {
    const div = document.createElement('div');
    div.className = isSystem ? "system" : "message";
    div.innerHTML = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function init(targetId = null) {
    if (peer) peer.destroy();
    
    // Create peer. If targetId is provided, we try to be the Host.
    peer = targetId ? new Peer(targetId) : new Peer();

    peer.on('open', (id) => {
      myIdEl.textContent = "ID: " + id;
      if (id === LOBBY_ID) {
        becomeHost();
      } else {
        becomeGuest();
      }
    });

    peer.on('error', (err) => {
      console.log("Peer error:", err.type);
      if (err.type === 'unavailable-id') {
        // If we tried to be Host but ID was taken, just be a Guest
        init(); 
      }
    });
  }

  function becomeHost() {
    isHost = true;
    statusEl.textContent = "Status: Hosting Lobby";
    addLog("--- You are the Host ---");
    
    peer.on('connection', (conn) => {
      setupConn(conn);
      addLog("User joined the lobby");
    });
  }

  function becomeGuest() {
    statusEl.textContent = "Status: Searching...";
    const conn = peer.connect(LOBBY_ID);

    // Timeout: If lobby isn't found in 3s, WE become the host
    const timeout = setTimeout(() => {
      if (connections.length === 0) {
        addLog("No lobby found. Starting one...");
        init(LOBBY_ID);
      }
    }, 3000);

    conn.on('open', () => {
      clearTimeout(timeout);
      statusEl.textContent = "Status: Connected (Guest)";
      addLog("--- Connected to Lobby ---");
      setupConn(conn);
    });
  }

  function setupConn(conn) {
    if (!connections.find(c => c.peer === conn.peer)) connections.push(conn);

    conn.on('data', (data) => {
      if (isHost) {
        // Relay to everyone else
        connections.forEach(c => { if(c.peer !== conn.peer) c.send(data); });
      }
      addLog(`<span class="username">${data.name}:</span> ${data.text}`, false);
    });

    conn.on('close', () => {
      connections = connections.filter(c => c.peer !== conn.peer);
      addLog("A user left");
    });
  }

  document.getElementById('send').onclick = () => {
    const text = msgInput.value.trim();
    if (!text) return;
    
    const data = { name: nameInput.value, text: text };
    connections.forEach(c => { if(c.open) c.send(data); });
    
    addLog(`<span class="username">You:</span> ${text}`, false);
    msgInput.value = "";
  };

  init();
</script>

</body>
</html>
